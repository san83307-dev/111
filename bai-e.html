<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>白厄 - 崩坏星穹铁道</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a14;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Microsoft YaHei', 'PingFang SC', 'Noto Serif SC', serif;
    user-select: none;
    -webkit-user-select: none;
  }

  .container {
    position: relative;
    width: 900px;
    height: 620px;
    display: flex;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(180, 150, 100, 0.25), 0 0 120px rgba(100, 70, 30, 0.15);
  }

  /* ── Starfield canvas ──────────────────── */
  #starCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Left panel (character art area) ───── */
  .left-panel {
    position: relative;
    width: 420px;
    background: linear-gradient(180deg, #1a1625 0%, #0d0b18 30%, #16101e 70%, #0d0a16 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
    cursor: pointer;
    overflow: hidden;
  }

  .character-display {
    position: relative;
    width: 320px;
    height: 500px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  /* Main character silhouette/stylized figure */
  .character-figure {
    position: relative;
    width: 200px;
    height: 380px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .figure-body {
    position: relative;
    width: 120px;
    height: 280px;
    background: linear-gradient(180deg,
      rgba(220,200,160,0.15) 0%,
      rgba(200,170,120,0.2) 20%,
      rgba(180,140,90,0.18) 40%,
      rgba(160,120,70,0.15) 60%,
      rgba(140,100,50,0.12) 80%,
      rgba(120,80,40,0.08) 100%
    );
    border-radius: 60px 60px 20px 20px;
    box-shadow:
      inset 0 0 60px rgba(200,160,100,0.1),
      0 0 40px rgba(200,160,100,0.15),
      0 0 80px rgba(180,130,70,0.08);
  }

  /* Halo/ring - signature element */
  .halo {
    position: absolute;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 2px solid rgba(220,190,130,0.4);
    box-shadow:
      0 0 30px rgba(220,180,100,0.3),
      0 0 60px rgba(200,150,60,0.15),
      inset 0 0 30px rgba(220,180,100,0.1);
    animation: haloPulse 3s ease-in-out infinite;
  }
  .halo::after {
    content: '';
    position: absolute;
    top: 6px; left: 6px;
    right: 6px; bottom: 6px;
    border-radius: 50%;
    border: 1px solid rgba(200,160,80,0.2);
    animation: haloInner 4s ease-in-out infinite;
  }

  @keyframes haloPulse {
    0%, 100% { box-shadow: 0 0 30px rgba(220,180,100,0.3), 0 0 60px rgba(200,150,60,0.15), inset 0 0 30px rgba(220,180,100,0.1); }
    50% { box-shadow: 0 0 50px rgba(240,200,120,0.45), 0 0 90px rgba(220,170,80,0.25), inset 0 0 40px rgba(240,200,120,0.15); }
  }
  @keyframes haloInner {
    0%, 100% { border-color: rgba(200,160,80,0.2); }
    50% { border-color: rgba(220,180,100,0.35); }
  }

  /* Floating light motes */
  .light-mote {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,220,150,0.9), rgba(200,150,50,0));
    pointer-events: none;
    animation: moteFloat 2s ease-in-out infinite;
  }

  @keyframes moteFloat {
    0%, 100% { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
    30% { opacity: 0.8; }
    50% { transform: translateY(-30px) translateX(10px) scale(1.5); opacity: 0.4; }
    70% { opacity: 0; }
  }

  /* Element/sigil symbols */
  .sigil {
    position: absolute;
    color: rgba(200,160,100,0.3);
    font-size: 40px;
    animation: sigilFloat 5s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes sigilFloat {
    0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.2; }
    50% { transform: translateY(-15px) rotate(10deg); opacity: 0.4; }
  }

  /* Click ripple */
  .ripple {
    position: absolute;
    border-radius: 50%;
    border: 2px solid rgba(220,180,100,0.6);
    animation: rippleOut 1s ease-out forwards;
    pointer-events: none;
  }
  @keyframes rippleOut {
    0% { width: 0; height: 0; opacity: 1; }
    100% { width: 300px; height: 300px; opacity: 0; margin-left: -150px; margin-top: -150px; }
  }

  /* ── Right panel (info area) ───────────── */
  .right-panel {
    position: relative;
    flex: 1;
    background: linear-gradient(180deg, #14101e 0%, #0f0c18 50%, #0c0914 100%);
    z-index: 1;
    display: flex;
    flex-direction: column;
    padding: 40px 30px;
    border-left: 1px solid rgba(180,140,80,0.2);
  }

  .char-name {
    font-size: 42px;
    font-weight: bold;
    background: linear-gradient(180deg, #f0d8a0 0%, #c8a060 50%, #a07838 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 6px;
    margin-bottom: 4px;
  }

  .char-title {
    font-size: 14px;
    color: rgba(200,160,100,0.6);
    letter-spacing: 3px;
    margin-bottom: 20px;
  }

  .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, rgba(200,150,80,0.6), rgba(200,150,80,0));
    margin-bottom: 24px;
  }

  .info-label {
    font-size: 11px;
    color: rgba(180,140,80,0.5);
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .info-value {
    font-size: 15px;
    color: rgba(220,200,160,0.8);
    margin-bottom: 16px;
    letter-spacing: 1px;
  }

  /* Voice line display */
  .dialogue-box {
    position: relative;
    margin-top: auto;
    padding: 20px 24px;
    background: rgba(200,160,100,0.04);
    border: 1px solid rgba(200,160,100,0.15);
    border-radius: 8px;
    min-height: 80px;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .dialogue-box:hover {
    border-color: rgba(220,180,120,0.4);
    background: rgba(200,160,100,0.07);
  }

  .dialogue-text {
    font-size: 16px;
    color: rgba(220,200,160,0.9);
    line-height: 1.6;
    transition: opacity 0.3s ease;
    font-style: italic;
  }

  .dialogue-hint {
    font-size: 11px;
    color: rgba(180,140,80,0.35);
    letter-spacing: 2px;
    margin-top: 10px;
  }

  /* Click particles */
  .click-particle {
    position: absolute;
    pointer-events: none;
    border-radius: 50%;
    animation: clickParticleUp 0.8s ease-out forwards;
  }
  @keyframes clickParticleUp {
    0% { transform: translateY(0) scale(1); opacity: 0.8; }
    100% { transform: translateY(-60px) scale(0); opacity: 0; }
  }

  /* Attribute grid */
  .attrs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px 20px;
    margin-bottom: 20px;
  }
  .attr-item {}
  .attr-label {
    font-size: 10px;
    color: rgba(180,140,80,0.45);
    letter-spacing: 1px;
  }
  .attr-val {
    font-size: 14px;
    color: rgba(220,200,160,0.75);
  }

  /* Responsive */
  @media (max-width: 920px) {
    .container { width: 95vw; height: auto; flex-direction: column; }
    .left-panel { width: 100%; height: 300px; }
    .right-panel { padding: 24px 20px; }
    .char-name { font-size: 32px; }
  }
</style>
</head>
<body>

<canvas id="starCanvas"></canvas>

<div class="container">
  <!-- Left: Character Display -->
  <div class="left-panel" id="leftPanel">
    <div class="character-display">
      <div class="character-figure">
        <div class="halo"></div>
        <div class="figure-body"></div>
        <div class="sigil" style="top:80px; left:30px;">✦</div>
        <div class="sigil" style="top:120px; right:20px; animation-delay:-2s;">◇</div>
        <div class="sigil" style="bottom:100px; left:15px; animation-delay:-4s;">◆</div>
      </div>
    </div>
  </div>

  <!-- Right: Info -->
  <div class="right-panel" id="rightPanel">
    <div class="char-name">白 厄</div>
    <div class="char-title">Bai-E · 毁灭命途</div>
    <div class="divider"></div>

    <div class="attrs">
      <div class="attr-item">
        <div class="attr-label">命途</div>
        <div class="attr-val">毁灭</div>
      </div>
      <div class="attr-item">
        <div class="attr-label">属性</div>
        <div class="attr-val">物理</div>
      </div>
      <div class="attr-item">
        <div class="attr-label">所属</div>
        <div class="attr-val">星核猎手</div>
      </div>
      <div class="attr-item">
        <div class="attr-label">稀有度</div>
        <div class="attr-val" style="color:#f0d090;">✦✦✦✦✦</div>
      </div>
    </div>

    <div class="info-label">阵营介绍</div>
    <div class="info-value">
      毁灭命途的行者，以绝对力量碾碎前路。白厄手持巨剑"断罪"，独自游走于星海之间，寻找值得一战的对手。
    </div>
    <div class="info-label">战斗定位</div>
    <div class="info-value">主C · 高爆发 · 对单特化</div>

    <div class="dialogue-box" id="dialogueBox">
      <div class="dialogue-text" id="dialogueText">"命运从不由天定，我的剑只为自己而挥。"</div>
      <div class="dialogue-hint">点击切换语音 ▸</div>
    </div>
  </div>
</div>

<script>
// ── Starfield background ────────────────────
const starCanvas = document.getElementById('starCanvas');
const sctx = starCanvas.getContext('2d');
let stars = [];

function resizeStarCanvas() {
  starCanvas.width = window.innerWidth;
  starCanvas.height = window.innerHeight;
}
resizeStarCanvas();
window.addEventListener('resize', () => {
  resizeStarCanvas();
  initStars();
});

function initStars() {
  stars = [];
  const count = 180;
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * starCanvas.width,
      y: Math.random() * starCanvas.height,
      r: Math.random() * 1.8 + 0.3,
      twinkleSpeed: Math.random() * 0.02 + 0.005,
      twinkleOffset: Math.random() * Math.PI * 2,
      hue: 35 + Math.random() * 25, // golden hue range
    });
  }
}
initStars();

function drawStars(time) {
  sctx.clearRect(0, 0, starCanvas.width, starCanvas.height);
  for (const s of stars) {
    const alpha = 0.3 + 0.35 * Math.sin(time * s.twinkleSpeed + s.twinkleOffset);
    sctx.fillStyle = `hsla(${s.hue}, 40%, 70%, ${alpha})`;
    sctx.beginPath();
    sctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    sctx.fill();
  }
}

// Shooting stars
let shootingStars = [];
function maybeShootStar() {
  if (Math.random() < 0.005) {
    shootingStars.push({
      x: Math.random() * starCanvas.width * 0.8,
      y: Math.random() * starCanvas.height * 0.4,
      vx: 3 + Math.random() * 5,
      vy: 1 + Math.random() * 3,
      life: 1,
    });
  }
}

function updateShootingStars() {
  for (let i = shootingStars.length - 1; i >= 0; i--) {
    const ss = shootingStars[i];
    ss.x += ss.vx;
    ss.y += ss.vy;
    ss.life -= 0.012;
    if (ss.life <= 0) shootingStars.splice(i, 1);
  }
}

function drawShootingStars() {
  for (const ss of shootingStars) {
    const grad = sctx.createLinearGradient(ss.x, ss.y, ss.x - ss.vx * 10, ss.y - ss.vy * 10);
    grad.addColorStop(0, `rgba(255,220,150,${ss.life})`);
    grad.addColorStop(1, 'rgba(255,200,100,0)');
    sctx.strokeStyle = grad;
    sctx.lineWidth = 1.5;
    sctx.beginPath();
    sctx.moveTo(ss.x, ss.y);
    sctx.lineTo(ss.x - ss.vx * 30, ss.y - ss.vy * 30);
    sctx.stroke();
  }
}

// ── Light motes on character ────────────────
const leftPanel = document.getElementById('leftPanel');
const motes = [];

function createMote(x, y) {
  const mote = document.createElement('div');
  mote.className = 'light-mote';
  const size = 3 + Math.random() * 6;
  mote.style.width = size + 'px';
  mote.style.height = size + 'px';
  mote.style.left = x + 'px';
  mote.style.top = y + 'px';
  mote.style.animationDuration = (1.5 + Math.random() * 2.5) + 's';
  mote.style.animationDelay = Math.random() * 2 + 's';
  leftPanel.appendChild(mote);

  setTimeout(() => {
    mote.remove();
    const idx = motes.indexOf(mote);
    if (idx > -1) motes.splice(idx, 1);
  }, 4000);

  motes.push(mote);
}

function spawnAmbientMotes() {
  const rect = leftPanel.getBoundingClientRect();
  const cx = rect.width / 2;
  const cy = rect.height / 2;
  for (let i = 0; i < 2; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 80 + Math.random() * 120;
    createMote(cx + Math.cos(angle) * dist, cy + Math.sin(angle) * dist);
  }
}

setInterval(spawnAmbientMotes, 1200);
spawnAmbientMotes();

// ── Click ripple on left panel ──────────────
leftPanel.addEventListener('click', (e) => {
  const rect = leftPanel.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  // Ripple
  const ripple = document.createElement('div');
  ripple.className = 'ripple';
  ripple.style.left = x + 'px';
  ripple.style.top = y + 'px';
  leftPanel.appendChild(ripple);
  setTimeout(() => ripple.remove(), 1000);

  // Burst motes
  for (let i = 0; i < 8; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 20 + Math.random() * 60;
    createMote(x + Math.cos(angle) * 20, y + Math.sin(angle) * 20);
  }

  // Cycle dialogue
  cycleDialogue();
});

// ── Dialogue cycling ────────────────────────
const dialogueBox = document.getElementById('dialogueBox');
const dialogueText = document.getElementById('dialogueText');

const voiceLines = [
  '"命运从不由天定，我的剑只为自己而挥。"',
  '"这世间没有斩不断的枷锁，如果一击不够，那就再来一击。"',
  '"审判之日终将到来，而我，便是执行者。"',
  '"孤独？不，我的剑就是最好的同伴。"',
  '"弱者的哀嚎毫无意义，站起来，拔出你的武器。"',
  '"星核猎手不需要过去，我们只创造未来。"',
  '"每一道伤疤都是荣耀的勋章，你要不要也来一枚？"',
  '"白厄从不回头，因为身后只有废墟。"',
  '"这把剑名为"断罪"，它曾斩落过星辰。"',
  '"你问我为何战斗？因为活着本身就是一场战斗。"',
];

let voiceIndex = 0;

function cycleDialogue() {
  voiceIndex = (voiceIndex + 1) % voiceLines.length;
  dialogueText.style.opacity = '0';
  setTimeout(() => {
    dialogueText.textContent = voiceLines[voiceIndex];
    dialogueText.style.opacity = '1';
  }, 150);

  // Spawn click particles near dialogue
  const rect = dialogueBox.getBoundingClientRect();
  for (let i = 0; i < 4; i++) {
    const particle = document.createElement('div');
    particle.className = 'click-particle';
    particle.style.left = (20 + Math.random() * rect.width * 0.7) + 'px';
    particle.style.top = (rect.height * 0.5 + Math.random() * 20) + 'px';
    particle.style.width = (2 + Math.random() * 3) + 'px';
    particle.style.height = particle.style.width;
    particle.style.background = `hsl(${35 + Math.random() * 15}, 60%, ${60 + Math.random() * 30}%)`;
    particle.style.animationDuration = (0.5 + Math.random() * 0.6) + 's';
    dialogueBox.appendChild(particle);
    setTimeout(() => particle.remove(), 900);
  }
}

dialogueBox.addEventListener('click', (e) => {
  e.stopPropagation();
  cycleDialogue();
});

// ── Music note animation on click ───────────
// (Subtle, just visual)

// ── Main animation loop ─────────────────────
let time = 0;
function animate(ts) {
  time = ts;
  drawStars(time);
  maybeShootStar();
  updateShootingStars();
  drawShootingStars();
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

// ── Keyboard: press 1-0 for voice lines ─────
document.addEventListener('keydown', (e) => {
  const num = parseInt(e.key);
  if (num >= 1 && num <= 9 && gameState === undefined) {
    voiceIndex = num - 1;
    dialogueText.style.opacity = '0';
    setTimeout(() => {
      if (voiceIndex < voiceLines.length) {
        dialogueText.textContent = voiceLines[voiceIndex];
      }
      dialogueText.style.opacity = '1';
    }, 150);
  }
  if (e.key === '0' && voiceLines[9]) {
    voiceIndex = 9;
    dialogueText.style.opacity = '0';
    setTimeout(() => {
      dialogueText.textContent = voiceLines[9];
      dialogueText.style.opacity = '1';
    }, 150);
  }
});

// ── Initial spawn ───────────────────────────
setTimeout(() => spawnAmbientMotes(), 500);
</script>
</body>
</html>

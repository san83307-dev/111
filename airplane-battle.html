<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飞机大战</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  }
  .game-wrapper {
    position: relative;
    border: 2px solid #334;
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(60, 120, 255, 0.3), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    background: linear-gradient(180deg, #0a1030 0%, #0d1540 100%);
    border-radius: 6px;
  }
  .ui-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  .start-text {
    color: #fff;
    font-size: 28px;
    letter-spacing: 4px;
    text-shadow: 0 0 20px rgba(100, 180, 255, 0.8);
    animation: pulse 1.5s ease-in-out infinite;
  }
  .start-sub {
    color: #88aacc;
    font-size: 14px;
    margin-top: 12px;
    letter-spacing: 2px;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); }
  }
</style>
</head>
<body>
<div class="game-wrapper">
  <canvas id="canvas"></canvas>
  <div class="ui-overlay" id="overlay">
    <div class="start-text">飞 机 大 战</div>
    <div class="start-sub">按空格键或点击开始  |  E键释放大招</div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');

const W = 480, H = 720;
canvas.width = W;
canvas.height = H;

// ── Game state ──────────────────────────────
let gameState = 'idle';
let score = 0;
let frame = 0;

// ── XP / Level system ──────────────────────
const XP_PER_LEVEL_BASE = 500;
function xpForLevel(lv) { return Math.floor(XP_PER_LEVEL_BASE * lv * (1 + lv * 0.3)); }

// ── Player ──────────────────────────────────
const player = {
  x: W / 2, y: H - 100,
  w: 44, h: 48,
  speed: 6,
  hp: 5,
  maxHp: 5,
  invincible: 0,
  level: 1,
  xp: 0,
  bulletDamage: 1,
  bulletCount: 2,
  fireRate: 10,
  // Energy / Ultimate
  energy: 0,
  maxEnergy: 100,
  ultimateActive: false,
  ultimateTimer: 0,
  // Attack speed boost buff
  attackBoostTimer: 0,
  // Wingmen
  wingmen: [],
  maxWingmen: 2,
};

// ── Boss tracking ───────────────────────────
let bossDefeated = 0;
let bossActive = false;
let bossWarning = 0;

// ── Notifications ───────────────────────────
let levelUpText = '';
let levelUpTimer = 0;
let ultimateFlash = 0;

// ── Arrays ──────────────────────────────────
let bullets = [];
let enemies = [];
let enemyBullets = [];
let particles = [];
let powerUps = [];
let floatingTexts = [];

// ── Input ───────────────────────────────────
const keys = {};
let mouseX = player.x;
let useMouse = false;

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'ArrowDown') {
    e.preventDefault();
  }
  if (e.key === ' ' && gameState === 'idle') startGame();
  if (e.key === ' ' && gameState === 'over') restartGame();
  // Ultimate
  if ((e.key === 'e' || e.key === 'E') && gameState === 'playing') activateUltimate();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (W / rect.width);
  useMouse = true;
});
canvas.addEventListener('mouseleave', () => { useMouse = false; });
canvas.addEventListener('click', () => {
  if (gameState === 'idle') startGame();
  if (gameState === 'over') restartGame();
});

// ── Ultimate ────────────────────────────────
function activateUltimate() {
  if (player.energy < player.maxEnergy) return;
  player.energy = 0;
  player.ultimateActive = true;
  player.ultimateTimer = 180; // 3 seconds
  player.invincible = Math.max(player.invincible, 180);
  ultimateFlash = 20;
  spawnParticles(player.x, player.y, '#ffdd00', 50);
  // Screen-clearing burst
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    spawnParticles(enemyBullets[i].x, enemyBullets[i].y, '#fff', 3);
    enemyBullets.splice(i, 1);
  }
}

// ── Shooting ────────────────────────────────
let shootCooldown = 0;

function shootFrom(x, y) {
  const dmg = player.bulletDamage * (player.ultimateActive ? 3 : 1);
  const count = player.bulletCount;
  const spread = count > 2 ? (count - 1) * 5 : 0;
  for (let i = 0; i < count; i++) {
    const offsetX = spread ? -spread / 2 + i * (spread / (count - 1)) : (i === 0 ? -8 : 4);
    bullets.push({ x: x + offsetX, y: y - 24, vy: -10, w: 4, h: 14, damage: dmg });
  }
}

function shoot() {
  if (shootCooldown > 0) return;
  shootFrom(player.x, player.y);
  // Wingmen shoot
  for (const wm of player.wingmen) {
    shootFrom(wm.x, wm.y);
  }
  const rate = player.attackBoostTimer > 0 ? Math.max(2, Math.floor(player.fireRate / 2)) : player.fireRate;
  shootCooldown = rate;
}

// ── Spawning ────────────────────────────────
let spawnTimer = 0;
let spawnInterval = 50;
let difficultyTimer = 0;

function spawnEnemy() {
  const type = Math.random() < 0.2 ? 'fast' : Math.random() < 0.15 ? 'tank' : 'normal';
  const config = {
    normal: { w: 36, h: 36, hp: 1, speed: 2 + Math.random() * 2, score: 100, xp: 30, color: '#e55' },
    fast:   { w: 28, h: 28, hp: 1, speed: 3.5 + Math.random() * 2.5, score: 150, xp: 50, color: '#f80' },
    tank:   { w: 50, h: 50, hp: 3, speed: 1 + Math.random() * 1.5, score: 300, xp: 100, color: '#c44' },
  }[type];
  enemies.push({
    x: Math.random() * (W - config.w) + config.w / 2,
    y: -config.h,
    w: config.w, h: config.h,
    hp: config.hp,
    maxHp: config.hp,
    speed: config.speed,
    score: config.score,
    xp: config.xp,
    color: config.color,
    type,
    isBoss: false,
    shootTimer: 70 + Math.random() * 90,
    phase: 0,
    phaseTimer: 0,
  });
}

function spawnBoss() {
  bossActive = true;
  bossWarning = 0;
  enemies.push({
    x: W / 2, y: -80,
    w: 80, h: 80,
    hp: 30 + bossDefeated * 15,
    maxHp: 30 + bossDefeated * 15,
    speed: 1.2,
    score: 2000 + bossDefeated * 1000,
    xp: 500 + bossDefeated * 200,
    color: '#f0f',
    type: 'boss',
    isBoss: true,
    shootTimer: 35,
    phase: 0,
    phaseTimer: 0,
    moveDir: 1,
    targetY: 120,
  });
}

function spawnPowerUp(x, y) {
  const r = Math.random();
  if (r < 0.18) {
    powerUps.push({ x, y, vy: 2, type: 'heal', r: 10 });
  } else if (r < 0.30) {
    powerUps.push({ x, y, vy: 2, type: 'xp', r: 9 });
  } else if (r < 0.40) {
    powerUps.push({ x, y, vy: 2, type: 'invincible', r: 10 });
  } else if (r < 0.50) {
    powerUps.push({ x, y, vy: 2, type: 'speedBoost', r: 10 });
  } else if (r < 0.58) {
    powerUps.push({ x, y, vy: 2, type: 'bigXp', r: 11 });
  } else if (r < 0.66) {
    powerUps.push({ x, y, vy: 2, type: 'wingman', r: 10 });
  }
}

// ── Floating text ───────────────────────────
function spawnFloatingText(x, y, text, color) {
  floatingTexts.push({ x, y, text, color, life: 40, vy: -1.5 });
}

// ── XP & Level-up ───────────────────────────
function addXP(amount) {
  player.xp += amount;
  while (player.xp >= xpForLevel(player.level)) {
    player.xp -= xpForLevel(player.level);
    levelUp();
  }
}

function levelUp() {
  player.level++;
  player.bulletDamage += 1;
  player.bulletCount = Math.min(10, player.bulletCount + 1);
  player.fireRate = Math.max(3, player.fireRate - 1);
  player.maxHp = Math.min(8, player.maxHp + 1);
  player.hp = Math.min(player.hp + 1, player.maxHp);
  levelUpText = `升级! Lv.${player.level}  伤害+1 子弹+1 射速↑`;
  levelUpTimer = 120;
  spawnParticles(player.x, player.y, '#ffdd00', 30);
}

// ── Particles ───────────────────────────────
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 20 + Math.random() * 20,
      maxLife: 40,
      color,
      r: 1.5 + Math.random() * 2.5,
    });
  }
}

// ── Collision ───────────────────────────────
function rectCollide(a, b) {
  return (
    Math.abs(a.x - b.x) < (a.w + b.w) / 2 &&
    Math.abs(a.y - b.y) < (a.h + b.h) / 2
  );
}

function circCollide(a, b) {
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  return Math.sqrt(dx * dx + dy * dy) < a.r + b.r;
}

// ── Drawing helpers ─────────────────────────
function drawPlayer() {
  const { x, y, w, h } = player;
  ctx.save();
  ctx.translate(x, y);

  if (player.invincible > 0 && Math.floor(player.invincible / 4) % 2 === 0) {
    ctx.globalAlpha = 0.4;
  }

  // Ultimate glow
  if (player.ultimateActive) {
    ctx.shadowColor = '#ffdd00';
    ctx.shadowBlur = 30;
    const aura = ctx.createRadialGradient(0, 0, 10, 0, 0, 40);
    aura.addColorStop(0, 'rgba(255,220,0,0.5)');
    aura.addColorStop(1, 'rgba(255,220,0,0)');
    ctx.fillStyle = aura;
    ctx.beginPath();
    ctx.arc(0, 0, 40, 0, Math.PI * 2);
    ctx.fill();
  } else if (player.attackBoostTimer > 0) {
    ctx.shadowColor = '#66aaff';
    ctx.shadowBlur = 15;
  } else if (levelUpTimer > 0) {
    ctx.shadowColor = '#ffdd00';
    ctx.shadowBlur = 20;
  }

  // Engine glow
  const glowGrad = ctx.createRadialGradient(0, h / 2 + 4, 2, 0, h / 2 + 6, 16);
  glowGrad.addColorStop(0, '#fff');
  glowGrad.addColorStop(0.3, player.ultimateActive ? '#ff0' : '#6cf');
  glowGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(-14, h / 2 - 4, 28, 22);

  // Left wing
  ctx.fillStyle = player.ultimateActive ? '#ffcc00' : '#4488cc';
  ctx.beginPath();
  ctx.moveTo(-w / 2, h / 2 - 6);
  ctx.lineTo(-w / 2 - 10, h / 2 - 14);
  ctx.lineTo(-w / 2 + 4, h / 2 + 2);
  ctx.closePath();
  ctx.fill();

  // Right wing
  ctx.beginPath();
  ctx.moveTo(w / 2, h / 2 - 6);
  ctx.lineTo(w / 2 + 10, h / 2 - 14);
  ctx.lineTo(w / 2 - 4, h / 2 + 2);
  ctx.closePath();
  ctx.fill();

  // Main body
  const bodyGrad = ctx.createLinearGradient(0, -h / 2, 0, h / 2);
  if (player.ultimateActive) {
    bodyGrad.addColorStop(0, '#ffe888');
    bodyGrad.addColorStop(0.5, '#ffcc00');
    bodyGrad.addColorStop(1, '#cc8800');
  } else {
    bodyGrad.addColorStop(0, '#aaddff');
    bodyGrad.addColorStop(0.5, '#5599dd');
    bodyGrad.addColorStop(1, '#3366aa');
  }
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.moveTo(0, -h / 2);
  ctx.lineTo(-8, h / 3);
  ctx.lineTo(-6, h / 2);
  ctx.lineTo(6, h / 2);
  ctx.lineTo(8, h / 3);
  ctx.closePath();
  ctx.fill();

  // Cockpit
  ctx.fillStyle = player.ultimateActive ? '#fff' : '#88ddff';
  ctx.beginPath();
  ctx.ellipse(0, -4, 5, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wing highlights
  ctx.strokeStyle = player.ultimateActive ? '#fff' : '#aaddff';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-12, h / 2 - 8);
  ctx.lineTo(-3, h / 2 + 4);
  ctx.moveTo(12, h / 2 - 8);
  ctx.lineTo(3, h / 2 + 4);
  ctx.stroke();

  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawWingman(wm) {
  ctx.save();
  ctx.translate(wm.x, wm.y);

  // Engine glow
  const glowGrad = ctx.createRadialGradient(0, 10, 1, 0, 12, 8);
  glowGrad.addColorStop(0, '#fff');
  glowGrad.addColorStop(0.3, '#8cf');
  glowGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(-6, 8, 12, 12);

  // Body
  ctx.fillStyle = '#5599dd';
  ctx.beginPath();
  ctx.moveTo(0, -8);
  ctx.lineTo(-5, 4);
  ctx.lineTo(-4, 8);
  ctx.lineTo(4, 8);
  ctx.lineTo(5, 4);
  ctx.closePath();
  ctx.fill();

  // Wings
  ctx.fillStyle = '#3377bb';
  ctx.fillRect(-7, 0, 4, 5);
  ctx.fillRect(3, 0, 4, 5);

  // Cockpit
  ctx.fillStyle = '#aaddff';
  ctx.beginPath();
  ctx.arc(0, -2, 3, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);

  if (e.isBoss) {
    drawBoss(e);
    ctx.restore();
    return;
  }

  const glowGrad = ctx.createRadialGradient(0, e.h / 2, 2, 0, e.h / 2 + 8, 14);
  glowGrad.addColorStop(0, '#faa');
  glowGrad.addColorStop(0.3, e.color);
  glowGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(-12, e.h / 2 - 4, 24, 20);

  const bodyGrad = ctx.createLinearGradient(0, -e.h / 2, 0, e.h / 2);
  bodyGrad.addColorStop(0, e.color);
  bodyGrad.addColorStop(1, '#661111');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.moveTo(0, -e.h / 2);
  ctx.lineTo(-e.w / 3, 0);
  ctx.lineTo(-e.w / 2, e.h / 3);
  ctx.lineTo(-e.w / 3, e.h / 2);
  ctx.lineTo(e.w / 3, e.h / 2);
  ctx.lineTo(e.w / 2, e.h / 3);
  ctx.lineTo(e.w / 3, 0);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#ffcccc';
  ctx.beginPath();
  ctx.ellipse(0, 0, e.w / 6, e.h / 5, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = e.color;
  ctx.fillRect(-e.w / 2 - 6, 4, 8, 6);
  ctx.fillRect(e.w / 2 - 2, 4, 8, 6);

  if ((e.type === 'tank' || e.isBoss) && e.hp < e.maxHp) {
    const barW = e.w, barH = 4;
    ctx.fillStyle = '#333';
    ctx.fillRect(-barW / 2, -e.h / 2 - 10, barW, barH);
    ctx.fillStyle = '#f55';
    ctx.fillRect(-barW / 2, -e.h / 2 - 10, barW * (e.hp / e.maxHp), barH);
  }

  ctx.restore();
}

function drawBoss(b) {
  const aura = ctx.createRadialGradient(0, 0, b.w * 0.4, 0, 0, b.w * 0.8);
  aura.addColorStop(0, 'rgba(255,0,255,0.3)');
  aura.addColorStop(1, 'rgba(255,0,255,0)');
  ctx.fillStyle = aura;
  ctx.beginPath();
  ctx.arc(0, 0, b.w * 0.8, 0, Math.PI * 2);
  ctx.fill();

  const bodyGrad = ctx.createLinearGradient(0, -b.h / 2, 0, b.h / 2);
  bodyGrad.addColorStop(0, '#f0f');
  bodyGrad.addColorStop(0.5, '#a0a');
  bodyGrad.addColorStop(1, '#606');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.moveTo(0, -b.h / 2);
  ctx.lineTo(-b.w / 3, -b.h / 4);
  ctx.lineTo(-b.w / 2, 0);
  ctx.lineTo(-b.w / 3, b.h / 3);
  ctx.lineTo(-b.w / 5, b.h / 2);
  ctx.lineTo(b.w / 5, b.h / 2);
  ctx.lineTo(b.w / 3, b.h / 3);
  ctx.lineTo(b.w / 2, 0);
  ctx.lineTo(b.w / 3, -b.h / 4);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#f00';
  ctx.beginPath();
  ctx.ellipse(0, -4, 10, 14, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ff0';
  ctx.beginPath();
  ctx.ellipse(0, -4, 4, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#808';
  ctx.fillRect(-b.w / 2 - 12, 0, 10, 16);
  ctx.fillRect(b.w / 2 + 2, 0, 10, 16);
  ctx.fillStyle = '#f0f';
  ctx.fillRect(-b.w / 2 - 10, 2, 6, 6);
  ctx.fillRect(b.w / 2 + 4, 2, 6, 6);

  const glowGrad = ctx.createRadialGradient(0, b.h / 2, 4, 0, b.h / 2 + 14, 22);
  glowGrad.addColorStop(0, '#faf');
  glowGrad.addColorStop(0.3, '#a0a');
  glowGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(-20, b.h / 2 - 4, 40, 28);

  const barW = b.w + 20, barH = 6;
  ctx.fillStyle = '#333';
  ctx.fillRect(-barW / 2, -b.h / 2 - 16, barW, barH);
  const hpRatio = b.hp / b.maxHp;
  const hpGrad = ctx.createLinearGradient(-barW / 2, 0, barW / 2, 0);
  hpGrad.addColorStop(0, '#f00');
  hpGrad.addColorStop(0.5, hpRatio > 0.3 ? '#ff0' : '#f00');
  hpGrad.addColorStop(1, '#f00');
  ctx.fillStyle = hpGrad;
  ctx.fillRect(-barW / 2, -b.h / 2 - 16, barW * hpRatio, barH);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.strokeRect(-barW / 2, -b.h / 2 - 16, barW, barH);

  ctx.fillStyle = '#f0f';
  ctx.font = 'bold 11px "Microsoft YaHei"';
  ctx.textAlign = 'center';
  ctx.fillText('BOSS', 0, -b.h / 2 - 22);
  ctx.textAlign = 'start';
}

function drawBullet(b) {
  ctx.fillStyle = b.damage >= 3 ? '#ffaa00' : '#ffee88';
  ctx.shadowColor = b.damage >= 3 ? '#ff6600' : '#ffaa00';
  ctx.shadowBlur = b.damage >= 3 ? 10 : 6;
  const bw = b.damage >= 3 ? 6 : b.w;
  const bh = b.damage >= 3 ? 18 : b.h;
  ctx.fillRect(b.x - bw / 2, b.y - bh / 2, bw, bh);
  ctx.shadowBlur = 0;
}

function drawEnemyBullet(b) {
  ctx.fillStyle = b.isBoss ? '#f0f' : '#ff6666';
  ctx.shadowColor = b.isBoss ? '#f0f' : '#ff0000';
  ctx.shadowBlur = b.isBoss ? 8 : 6;
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.isBoss ? 5 : 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawPowerUp(p) {
  ctx.save();
  ctx.translate(p.x, p.y);

  switch (p.type) {
    case 'heal': {
      const grad = ctx.createRadialGradient(0, 0, 2, 0, 0, p.r);
      grad.addColorStop(0, '#fff');
      grad.addColorStop(0.4, '#6f6');
      grad.addColorStop(1, '#060');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(0, 0, p.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.fillRect(-5, -1.5, 10, 3);
      ctx.fillRect(-1.5, -5, 3, 10);
      break;
    }
    case 'xp': {
      const grad = ctx.createRadialGradient(0, 0, 2, 0, 0, p.r);
      grad.addColorStop(0, '#fff');
      grad.addColorStop(0.4, '#ff0');
      grad.addColorStop(1, '#860');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(0, 0, p.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('XP', 0, 4);
      ctx.textAlign = 'start';
      break;
    }
    case 'bigXp': {
      const grad = ctx.createRadialGradient(0, 0, 2, 0, 0, p.r);
      grad.addColorStop(0, '#fff');
      grad.addColorStop(0.4, '#f80');
      grad.addColorStop(1, '#840');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(0, 0, p.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 9px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('XP+', 0, 3);
      ctx.textAlign = 'start';
      break;
    }
    case 'invincible': {
      const grad = ctx.createRadialGradient(0, 0, 2, 0, 0, p.r);
      grad.addColorStop(0, '#fff');
      grad.addColorStop(0.4, '#fd0');
      grad.addColorStop(1, '#850');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(0, 0, p.r, 0, Math.PI * 2);
      ctx.fill();
      // Shield icon
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, -7);
      ctx.lineTo(6, -3);
      ctx.lineTo(6, 2);
      ctx.quadraticCurveTo(3, 8, 0, 7);
      ctx.quadraticCurveTo(-3, 8, -6, 2);
      ctx.lineTo(-6, -3);
      ctx.closePath();
      ctx.stroke();
      break;
    }
    case 'speedBoost': {
      const grad = ctx.createRadialGradient(0, 0, 2, 0, 0, p.r);
      grad.addColorStop(0, '#fff');
      grad.addColorStop(0.4, '#6af');
      grad.addColorStop(1, '#037');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(0, 0, p.r, 0, Math.PI * 2);
      ctx.fill();
      // Lightning icon
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.moveTo(2, -7);
      ctx.lineTo(-3, 0);
      ctx.lineTo(1, 0);
      ctx.lineTo(-2, 7);
      ctx.lineTo(4, -1);
      ctx.lineTo(0, -1);
      ctx.closePath();
      ctx.fill();
      break;
    }
    case 'wingman': {
      const grad = ctx.createRadialGradient(0, 0, 2, 0, 0, p.r);
      grad.addColorStop(0, '#fff');
      grad.addColorStop(0.4, '#c8f');
      grad.addColorStop(1, '#508');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(0, 0, p.r, 0, Math.PI * 2);
      ctx.fill();
      // Mini plane icon
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.moveTo(0, -6);
      ctx.lineTo(-4, 2);
      ctx.lineTo(-2, 5);
      ctx.lineTo(2, 5);
      ctx.lineTo(4, 2);
      ctx.closePath();
      ctx.fill();
      break;
    }
  }

  ctx.restore();
}

function drawParticle(p) {
  const alpha = p.life / p.maxLife;
  ctx.fillStyle = p.color;
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.r * alpha, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawStars() {
  for (let i = 0; i < 50; i++) {
    const sx = (i * 137.5 + 31) % W;
    const sy = (frame * (0.5 + i * 0.07) + i * 97) % H;
    const alpha = 0.3 + 0.4 * Math.sin(frame * 0.03 + i);
    ctx.fillStyle = `rgba(180,200,255,${alpha})`;
    ctx.fillRect(sx, sy, 2, 2);
  }
}

function drawBossWarning() {
  if (bossWarning <= 0) return;
  const alpha = Math.abs(Math.sin(bossWarning * 0.1));
  ctx.fillStyle = `rgba(255,0,0,${alpha * 0.6})`;
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = `rgba(255,50,50,${alpha})`;
  ctx.font = 'bold 36px "Microsoft YaHei"';
  ctx.textAlign = 'center';
  ctx.fillText('⚠ 警告 ⚠', W / 2, H / 2 - 10);
  ctx.fillStyle = `rgba(255,200,200,${alpha})`;
  ctx.font = '20px "Microsoft YaHei"';
  ctx.fillText('首领来袭!', W / 2, H / 2 + 30);
  ctx.textAlign = 'start';
}

function drawUltimateFlash() {
  if (ultimateFlash <= 0) return;
  const alpha = ultimateFlash / 20;
  ctx.fillStyle = `rgba(255,255,200,${alpha * 0.5})`;
  ctx.fillRect(0, 0, W, H);
}

// ── Update ──────────────────────────────────
function update() {
  frame++;

  // Player movement
  if (useMouse) {
    const target = mouseX;
    player.x += (target - player.x) * 0.15;
  } else {
    if (keys['ArrowLeft'] || keys['a'] || keys['A']) player.x -= player.speed;
    if (keys['ArrowRight'] || keys['d'] || keys['D']) player.x += player.speed;
    if (keys['ArrowUp'] || keys['w'] || keys['W']) player.y -= player.speed;
    if (keys['ArrowDown'] || keys['s'] || keys['S']) player.y += player.speed;
  }

  player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, player.x));
  player.y = Math.max(player.h / 2, Math.min(H - player.h / 2, player.y));

  // Auto-shoot
  if (gameState === 'playing') {
    shootCooldown = Math.max(0, shootCooldown - 1);
    shoot();
  }

  // Timers
  if (player.invincible > 0) player.invincible--;
  if (player.ultimateTimer > 0) {
    player.ultimateTimer--;
    if (player.ultimateTimer <= 0) player.ultimateActive = false;
  }
  if (player.attackBoostTimer > 0) player.attackBoostTimer--;
  if (levelUpTimer > 0) levelUpTimer--;
  if (ultimateFlash > 0) ultimateFlash--;
  if (bossWarning > 0) bossWarning--;

  // Energy regen
  if (gameState === 'playing' && !player.ultimateActive) {
    player.energy = Math.min(player.maxEnergy, player.energy + 0.08);
  }

  // Wingmen follow player
  const wmOffsets = [
    { dx: -30, dy: 10 },
    { dx: 30, dy: 10 },
  ];
  for (let i = 0; i < player.wingmen.length; i++) {
    const wm = player.wingmen[i];
    const targetX = player.x + wmOffsets[i].dx;
    const targetY = player.y + wmOffsets[i].dy;
    wm.x += (targetX - wm.x) * 0.1;
    wm.y += (targetY - wm.y) * 0.1;
  }

  // Boss spawn check
  const nextBossScore = (bossDefeated + 1) * 5000;
  if (!bossActive && bossWarning <= 0 && score >= nextBossScore) {
    bossWarning = 90;
  }
  if (bossWarning === 1 && !bossActive) {
    spawnBoss();
  }

  // Spawn enemies
  if (!bossActive && bossWarning <= 0) {
    spawnTimer++;
    difficultyTimer++;
    if (difficultyTimer > 600) {
      spawnInterval = Math.max(15, spawnInterval - 2);
      difficultyTimer = 0;
    }
    if (spawnTimer >= spawnInterval) {
      spawnEnemy();
      spawnTimer = 0;
    }
  }

  // Update bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    bullets[i].y += bullets[i].vy;
    if (bullets[i].y < -20) bullets.splice(i, 1);
  }

  // Update enemy bullets
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    enemyBullets[i].y += enemyBullets[i].vy;
    enemyBullets[i].x += enemyBullets[i].vx || 0;
    if (enemyBullets[i].y > H + 20 || enemyBullets[i].y < -20) enemyBullets.splice(i, 1);
  }

  // Update enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.y += e.speed;

    // Boss behavior
    if (e.isBoss) {
      e.phaseTimer++;
      if (e.phase === 0) {
        if (e.y >= e.targetY) {
          e.phase = 1;
          e.phaseTimer = 0;
          e.speed = 0;
        }
      }
      if (e.phase === 1) {
        e.x += e.moveDir * 1.5;
        if (e.x > W - e.w / 2 - 10) e.moveDir = -1;
        if (e.x < e.w / 2 + 10) e.moveDir = 1;
      }
    }

    // Enemy shooting
    e.shootTimer--;
    if (e.shootTimer <= 0 && e.y > 0 && e.y < H - 100) {
      if (e.isBoss) {
        const spreadCount = 5 + bossDefeated;
        for (let j = 0; j < spreadCount; j++) {
          const angle = (j / spreadCount) * Math.PI * 2 + frame * 0.02;
          enemyBullets.push({
            x: e.x, y: e.y,
            vx: Math.cos(angle) * 2.5,
            vy: Math.sin(angle) * 2.5,
            isBoss: true,
          });
        }
        const dx = player.x - e.x;
        const dy = player.y - e.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        enemyBullets.push({
          x: e.x, y: e.y,
          vx: (dx / dist) * 4,
          vy: (dy / dist) * 4,
          isBoss: true,
        });
        e.shootTimer = 35 + bossDefeated * 3;
      } else {
        const dx = player.x - e.x;
        const dy = player.y - e.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        enemyBullets.push({
          x: e.x, y: e.y + e.h / 2,
          vx: (dx / dist) * 3.5,
          vy: (dy / dist) * 3.5,
          isBoss: false,
        });
        e.shootTimer = 70 + Math.random() * 90;
      }
    }

    // Off-screen removal
    if (e.y > H + 100) {
      if (e.isBoss) bossActive = false;
      enemies.splice(i, 1);
      continue;
    }

    // Bullet-enemy collision
    let hit = false;
    for (let j = bullets.length - 1; j >= 0; j--) {
      if (rectCollide(bullets[j], e)) {
        const dmg = bullets[j].damage || 1;
        bullets.splice(j, 1);
        e.hp -= dmg;
        if (e.hp <= 0) {
          spawnParticles(e.x, e.y, e.color, e.isBoss ? 40 : 12);
          spawnPowerUp(e.x, e.y);
          if (e.isBoss) {
            spawnPowerUp(e.x - 20, e.y);
            spawnPowerUp(e.x + 20, e.y);
            spawnPowerUp(e.x, e.y - 20);
            bossActive = false;
            bossDefeated++;
            player.energy = Math.min(player.maxEnergy, player.energy + 20);
          }
          score += e.score;
          addXP(e.xp);
          player.energy = Math.min(player.maxEnergy, player.energy + 5);
          spawnFloatingText(e.x, e.y, `+${e.xp}XP`, '#ffdd00');
          enemies.splice(i, 1);
          hit = true;
          break;
        } else {
          spawnParticles(bullets[j].x, bullets[j].y, '#fff', 3);
        }
      }
    }
    if (hit) continue;

    // Enemy-player collision
    if (player.invincible === 0 && rectCollide(player, e)) {
      spawnParticles(e.x, e.y, e.color, 15);
      if (!e.isBoss) enemies.splice(i, 1);
      player.hp--;
      player.invincible = 60;
      if (player.hp <= 0) { gameOver(); return; }
    }
  }

  // Enemy bullets vs player
  if (player.invincible === 0) {
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
      const b = enemyBullets[i];
      if (Math.abs(b.x - player.x) < player.w / 2 + 4 && Math.abs(b.y - player.y) < player.h / 2 + 4) {
        enemyBullets.splice(i, 1);
        player.hp--;
        player.invincible = 60;
        spawnParticles(player.x, player.y, '#fff', 8);
        if (player.hp <= 0) { gameOver(); return; }
      }
    }
  }

  // Power-ups
  for (let i = powerUps.length - 1; i >= 0; i--) {
    powerUps[i].y += powerUps[i].vy;
    if (powerUps[i].y > H + 30) { powerUps.splice(i, 1); continue; }
    if (circCollide(player, powerUps[i])) {
      const p = powerUps[i];
      switch (p.type) {
        case 'heal':
          if (player.hp < player.maxHp) {
            player.hp++;
            spawnFloatingText(p.x, p.y, '+HP', '#6f6');
          }
          break;
        case 'xp':
          addXP(50 + player.level * 10);
          spawnFloatingText(p.x, p.y, '+XP', '#ff0');
          break;
        case 'bigXp':
          addXP(200 + player.level * 50);
          spawnFloatingText(p.x, p.y, '+XP!', '#f80');
          spawnParticles(p.x, p.y, '#f80', 10);
          break;
        case 'invincible':
          player.invincible = Math.max(player.invincible, 180);
          spawnFloatingText(p.x, p.y, '无敌!', '#fd0');
          break;
        case 'speedBoost':
          player.attackBoostTimer = 300;
          spawnFloatingText(p.x, p.y, '射速UP!', '#6af');
          break;
        case 'wingman':
          if (player.wingmen.length < player.maxWingmen) {
            player.wingmen.push({ x: player.x, y: player.y });
            spawnFloatingText(p.x, p.y, '僚机+1!', '#c8f');
            spawnParticles(p.x, p.y, '#c8f', 15);
          } else {
            addXP(100 + player.level * 20);
            spawnFloatingText(p.x, p.y, '+XP', '#ff0');
          }
          break;
      }
      if (p.type !== 'bigXp' && p.type !== 'wingman') {
        spawnParticles(p.x, p.y, '#fff', 8);
      }
      powerUps.splice(i, 1);
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Floating texts
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.y += ft.vy;
    ft.life--;
    if (ft.life <= 0) floatingTexts.splice(i, 1);
  }
}

// ── Render ──────────────────────────────────
function render() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#080e24';
  ctx.fillRect(0, 0, W, H);
  drawStars();

  for (const p of powerUps) drawPowerUp(p);
  for (const b of bullets) drawBullet(b);
  for (const b of enemyBullets) drawEnemyBullet(b);
  for (const e of enemies) drawEnemy(e);
  for (const p of particles) drawParticle(p);
  for (const wm of player.wingmen) drawWingman(wm);
  if (gameState !== 'over') drawPlayer();

  // Floating texts
  for (const ft of floatingTexts) {
    const alpha = ft.life / 40;
    ctx.fillStyle = ft.color;
    ctx.globalAlpha = alpha;
    ctx.font = 'bold 14px "Microsoft YaHei"';
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.textAlign = 'start';
    ctx.globalAlpha = 1;
  }

  drawBossWarning();
  drawUltimateFlash();

  // --- HUD ---
  ctx.textAlign = 'left';

  // Score & Level
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px "Microsoft YaHei"';
  ctx.fillText(`分数: ${score}`, 14, 30);
  ctx.fillText(`Lv.${player.level}`, 14, 54);

  // XP bar
  const xpBarW = 140, xpBarH = 6, xpBarX = 14, xpBarY = 62;
  const xpNeeded = xpForLevel(player.level);
  ctx.fillStyle = '#333';
  ctx.fillRect(xpBarX, xpBarY, xpBarW, xpBarH);
  const xpGrad = ctx.createLinearGradient(xpBarX, 0, xpBarX + xpBarW, 0);
  xpGrad.addColorStop(0, '#44f');
  xpGrad.addColorStop(1, '#8af');
  ctx.fillStyle = xpGrad;
  ctx.fillRect(xpBarX, xpBarY, xpBarW * (player.xp / xpNeeded), xpBarH);
  ctx.fillStyle = '#aaa';
  ctx.font = '9px "Microsoft YaHei"';
  ctx.fillText(`XP ${player.xp}/${xpNeeded}`, xpBarX, xpBarY + 12);

  // Energy bar (ultimate)
  const eBarW = 140, eBarH = 6, eBarX = 14, eBarY = 82;
  ctx.fillStyle = '#333';
  ctx.fillRect(eBarX, eBarY, eBarW, eBarH);
  const eGrad = ctx.createLinearGradient(eBarX, 0, eBarX + eBarW, 0);
  eGrad.addColorStop(0, '#f80');
  eGrad.addColorStop(1, '#ff0');
  ctx.fillStyle = eGrad;
  ctx.fillRect(eBarX, eBarY, eBarW * (player.energy / player.maxEnergy), eBarH);
  ctx.fillStyle = '#aaa';
  ctx.font = '9px "Microsoft YaHei"';
  ctx.fillText(player.energy >= player.maxEnergy ? '能量已满 [E]' : `能量 ${Math.floor(player.energy)}%`, eBarX, eBarY + 12);

  // HP hearts
  for (let i = 0; i < player.maxHp; i++) {
    ctx.fillStyle = i < player.hp ? '#ff4466' : '#444';
    ctx.font = '20px sans-serif';
    ctx.fillText(i < player.hp ? '♥' : '♡', W - 30 - i * 28, 30);
  }

  // Buff indicators
  let buffY = 52;
  if (player.ultimateActive) {
    ctx.fillStyle = '#ffdd00';
    ctx.font = 'bold 11px "Microsoft YaHei"';
    ctx.textAlign = 'right';
    ctx.fillText(`大招 ${Math.ceil(player.ultimateTimer / 60)}s`, W - 14, buffY);
    ctx.textAlign = 'left';
    buffY += 14;
  }
  if (player.attackBoostTimer > 0) {
    ctx.fillStyle = '#6af';
    ctx.font = 'bold 11px "Microsoft YaHei"';
    ctx.textAlign = 'right';
    ctx.fillText(`射速UP ${Math.ceil(player.attackBoostTimer / 60)}s`, W - 14, buffY);
    ctx.textAlign = 'left';
    buffY += 14;
  }
  if (player.invincible > 60) {
    ctx.fillStyle = '#fd0';
    ctx.font = 'bold 11px "Microsoft YaHei"';
    ctx.textAlign = 'right';
    ctx.fillText(`无敌 ${Math.ceil(player.invincible / 60)}s`, W - 14, buffY);
    ctx.textAlign = 'left';
  }

  // Wingmen count
  if (player.wingmen.length > 0) {
    ctx.fillStyle = '#c8f';
    ctx.font = '11px "Microsoft YaHei"';
    ctx.textAlign = 'right';
    ctx.fillText(`僚机 ${player.wingmen.length}/${player.maxWingmen}`, W - 14, H - 14);
    ctx.textAlign = 'left';
  }

  // Boss HP bar (top-center)
  for (const e of enemies) {
    if (e.isBoss) {
      const bbW = 300, bbH = 8;
      const bbX = W / 2 - bbW / 2, bbY = 10;
      ctx.fillStyle = '#222';
      ctx.fillRect(bbX, bbY, bbW, bbH);
      ctx.fillStyle = '#f0f';
      ctx.fillRect(bbX, bbY, bbW * (e.hp / e.maxHp), bbH);
      ctx.strokeStyle = '#faf';
      ctx.lineWidth = 1;
      ctx.strokeRect(bbX, bbY, bbW, bbH);
      ctx.fillStyle = '#faf';
      ctx.font = 'bold 11px "Microsoft YaHei"';
      ctx.textAlign = 'center';
      ctx.fillText(`BOSS  ${Math.ceil(e.hp)}/${e.maxHp}`, W / 2, bbY - 4);
      ctx.textAlign = 'start';
      break;
    }
  }

  // Level-up notification
  if (levelUpTimer > 0 && levelUpText) {
    const alpha = levelUpTimer > 30 ? 1 : levelUpTimer / 30;
    ctx.fillStyle = `rgba(255,220,0,${alpha})`;
    ctx.font = 'bold 22px "Microsoft YaHei"';
    ctx.textAlign = 'center';
    ctx.fillText(levelUpText, W / 2, H / 2 - 80);
    ctx.textAlign = 'start';
  }
}

function gameOver() {
  gameState = 'over';
  spawnParticles(player.x, player.y, '#fff', 30);
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 42px "Microsoft YaHei"';
  ctx.textAlign = 'center';
  ctx.fillText('游戏结束', W / 2, H / 2 - 50);

  ctx.fillStyle = '#fff';
  ctx.font = '20px "Microsoft YaHei"';
  ctx.fillText(`最终得分: ${score}`, W / 2, H / 2 - 5);
  ctx.fillText(`等级: Lv.${player.level}  击杀首领: ${bossDefeated}`, W / 2, H / 2 + 25);

  ctx.fillStyle = '#aaccff';
  ctx.font = '16px "Microsoft YaHei"';
  ctx.fillText('按空格键或点击重新开始', W / 2, H / 2 + 60);

  ctx.textAlign = 'start';
}

// ── Game loop ───────────────────────────────
function loop() {
  if (gameState === 'playing') {
    update();
    render();
  } else if (gameState === 'over') {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
    render();
    drawGameOver();
  } else {
    render();
  }
  requestAnimationFrame(loop);
}

function startGame() {
  gameState = 'playing';
  overlay.style.display = 'none';
  resetGame();
}

function restartGame() {
  resetGame();
  gameState = 'playing';
}

function resetGame() {
  score = 0;
  player.x = W / 2;
  player.y = H - 100;
  player.hp = 5;
  player.maxHp = 5;
  player.invincible = 60;
  player.level = 1;
  player.xp = 0;
  player.bulletDamage = 1;
  player.bulletCount = 2;
  player.fireRate = 10;
  player.energy = 0;
  player.maxEnergy = 100;
  player.ultimateActive = false;
  player.ultimateTimer = 0;
  player.attackBoostTimer = 0;
  player.wingmen = [];
  bullets = [];
  enemies = [];
  enemyBullets = [];
  particles = [];
  powerUps = [];
  floatingTexts = [];
  spawnTimer = 0;
  spawnInterval = 50;
  difficultyTimer = 0;
  shootCooldown = 0;
  bossDefeated = 0;
  bossActive = false;
  bossWarning = 0;
  levelUpText = '';
  levelUpTimer = 0;
  ultimateFlash = 0;
}

loop();
</script>

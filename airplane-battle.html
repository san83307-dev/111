<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飞机大战</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  }
  .game-wrapper {
    position: relative;
    border: 2px solid #334;
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(60, 120, 255, 0.3), inset 0 0 20px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    background: linear-gradient(180deg, #0a1030 0%, #0d1540 100%);
    border-radius: 6px;
  }
  .ui-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  .start-text {
    color: #fff;
    font-size: 28px;
    letter-spacing: 4px;
    text-shadow: 0 0 20px rgba(100, 180, 255, 0.8);
    animation: pulse 1.5s ease-in-out infinite;
  }
  .start-sub {
    color: #88aacc;
    font-size: 14px;
    margin-top: 12px;
    letter-spacing: 2px;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); }
  }
</style>
</head>
<body>
<div class="game-wrapper">
  <canvas id="canvas"></canvas>
  <div class="ui-overlay" id="overlay">
    <div class="start-text">飞 机 大 战</div>
    <div class="start-sub">按空格键或点击开始</div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');

const W = 480, H = 720;
canvas.width = W;
canvas.height = H;

// ── Game state ──────────────────────────────
let gameState = 'idle'; // idle | playing | over
let score = 0;
let frame = 0;

// ── Player ──────────────────────────────────
const player = {
  x: W / 2, y: H - 100,
  w: 44, h: 48,
  speed: 6,
  hp: 3,
  invincible: 0, // invincibility frames after hit
};

// ── Arrays ──────────────────────────────────
let bullets = [];
let enemies = [];
let enemyBullets = [];
let particles = [];
let powerUps = [];

// ── Input ───────────────────────────────────
const keys = {};
let mouseX = player.x;
let useMouse = false;

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'ArrowDown') {
    e.preventDefault();
  }
  if (e.key === ' ' && gameState === 'idle') startGame();
  if (e.key === ' ' && gameState === 'over') restartGame();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (W / rect.width);
  useMouse = true;
});
canvas.addEventListener('mouseleave', () => { useMouse = false; });
canvas.addEventListener('click', () => {
  if (gameState === 'idle') startGame();
  if (gameState === 'over') restartGame();
});

// ── Shooting ────────────────────────────────
let shootCooldown = 0;
const SHOOT_DELAY = 10;

function shoot() {
  if (shootCooldown > 0) return;
  bullets.push({ x: player.x - 8, y: player.y - 24, vy: -10, w: 4, h: 14 });
  bullets.push({ x: player.x + 4, y: player.y - 24, vy: -10, w: 4, h: 14 });
  shootCooldown = SHOOT_DELAY;
}

// ── Spawning ────────────────────────────────
let spawnTimer = 0;
let spawnInterval = 50;
let difficultyTimer = 0;

function spawnEnemy() {
  const type = Math.random() < 0.2 ? 'fast' : Math.random() < 0.15 ? 'tank' : 'normal';
  const config = {
    normal: { w: 36, h: 36, hp: 1, speed: 2 + Math.random() * 2, score: 100, color: '#e55' },
    fast:   { w: 28, h: 28, hp: 1, speed: 3.5 + Math.random() * 2.5, score: 150, color: '#f80' },
    tank:   { w: 50, h: 50, hp: 3, speed: 1 + Math.random() * 1.5, score: 300, color: '#c44' },
  }[type];
  enemies.push({
    x: Math.random() * (W - config.w) + config.w / 2,
    y: -config.h,
    w: config.w, h: config.h,
    hp: config.hp,
    maxHp: config.hp,
    speed: config.speed,
    score: config.score,
    color: config.color,
    type,
    shootTimer: 40 + Math.random() * 80,
  });
}

function spawnPowerUp(x, y) {
  if (Math.random() < 0.25) {
    powerUps.push({ x, y, vy: 2, type: 'heal', r: 10 });
  }
}

// ── Particles ───────────────────────────────
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 20 + Math.random() * 20,
      maxLife: 40,
      color,
      r: 1.5 + Math.random() * 2.5,
    });
  }
}

// ── Collision ───────────────────────────────
function rectCollide(a, b) {
  return (
    Math.abs(a.x - b.x) < (a.w + b.w) / 2 &&
    Math.abs(a.y - b.y) < (a.h + b.h) / 2
  );
}

function circCollide(a, b) {
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  return Math.sqrt(dx * dx + dy * dy) < a.r + b.r;
}

// ── Drawing helpers ─────────────────────────
function drawPlayer() {
  const { x, y, w, h } = player;

  ctx.save();
  ctx.translate(x, y);

  // Invincibility flash
  if (player.invincible > 0 && Math.floor(player.invincible / 4) % 2 === 0) {
    ctx.globalAlpha = 0.4;
  }

  // Engine glow
  const glowGrad = ctx.createRadialGradient(0, h / 2 + 4, 2, 0, h / 2 + 6, 16);
  glowGrad.addColorStop(0, '#fff');
  glowGrad.addColorStop(0.3, '#6cf');
  glowGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(-14, h / 2 - 4, 28, 22);

  // Left wing
  ctx.fillStyle = '#4488cc';
  ctx.beginPath();
  ctx.moveTo(-w / 2, h / 2 - 6);
  ctx.lineTo(-w / 2 - 10, h / 2 - 14);
  ctx.lineTo(-w / 2 + 4, h / 2 + 2);
  ctx.closePath();
  ctx.fill();

  // Right wing
  ctx.beginPath();
  ctx.moveTo(w / 2, h / 2 - 6);
  ctx.lineTo(w / 2 + 10, h / 2 - 14);
  ctx.lineTo(w / 2 - 4, h / 2 + 2);
  ctx.closePath();
  ctx.fill();

  // Main body
  const bodyGrad = ctx.createLinearGradient(0, -h / 2, 0, h / 2);
  bodyGrad.addColorStop(0, '#aaddff');
  bodyGrad.addColorStop(0.5, '#5599dd');
  bodyGrad.addColorStop(1, '#3366aa');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.moveTo(0, -h / 2);
  ctx.lineTo(-8, h / 3);
  ctx.lineTo(-6, h / 2);
  ctx.lineTo(6, h / 2);
  ctx.lineTo(8, h / 3);
  ctx.closePath();
  ctx.fill();

  // Cockpit
  ctx.fillStyle = '#88ddff';
  ctx.beginPath();
  ctx.ellipse(0, -4, 5, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wing highlights
  ctx.strokeStyle = '#aaddff';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-12, h / 2 - 8);
  ctx.lineTo(-3, h / 2 + 4);
  ctx.moveTo(12, h / 2 - 8);
  ctx.lineTo(3, h / 2 + 4);
  ctx.stroke();

  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);

  // Engine glow
  const glowGrad = ctx.createRadialGradient(0, e.h / 2, 2, 0, e.h / 2 + 8, 14);
  glowGrad.addColorStop(0, '#faa');
  glowGrad.addColorStop(0.3, e.color);
  glowGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(-12, e.h / 2 - 4, 24, 20);

  // Body
  const bodyGrad = ctx.createLinearGradient(0, -e.h / 2, 0, e.h / 2);
  bodyGrad.addColorStop(0, e.color);
  bodyGrad.addColorStop(1, '#661111');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.moveTo(0, -e.h / 2);
  ctx.lineTo(-e.w / 3, 0);
  ctx.lineTo(-e.w / 2, e.h / 3);
  ctx.lineTo(-e.w / 3, e.h / 2);
  ctx.lineTo(e.w / 3, e.h / 2);
  ctx.lineTo(e.w / 2, e.h / 3);
  ctx.lineTo(e.w / 3, 0);
  ctx.closePath();
  ctx.fill();

  // Cockpit
  ctx.fillStyle = '#ffcccc';
  ctx.beginPath();
  ctx.ellipse(0, 0, e.w / 6, e.h / 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wings
  ctx.fillStyle = e.color;
  ctx.fillRect(-e.w / 2 - 6, 4, 8, 6);
  ctx.fillRect(e.w / 2 - 2, 4, 8, 6);

  // HP bar for tanks
  if (e.type === 'tank' && e.hp < e.maxHp) {
    const barW = e.w;
    const barH = 4;
    ctx.fillStyle = '#333';
    ctx.fillRect(-barW / 2, -e.h / 2 - 10, barW, barH);
    ctx.fillStyle = '#f55';
    ctx.fillRect(-barW / 2, -e.h / 2 - 10, barW * (e.hp / e.maxHp), barH);
  }

  ctx.restore();
}

function drawBullet(b) {
  ctx.fillStyle = '#ffee88';
  ctx.shadowColor = '#ffaa00';
  ctx.shadowBlur = 6;
  ctx.fillRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h);
  ctx.shadowBlur = 0;
}

function drawEnemyBullet(b) {
  ctx.fillStyle = '#ff6666';
  ctx.shadowColor = '#ff0000';
  ctx.shadowBlur = 6;
  ctx.beginPath();
  ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawPowerUp(p) {
  ctx.save();
  ctx.translate(p.x, p.y);

  const grad = ctx.createRadialGradient(0, 0, 2, 0, 0, p.r);
  grad.addColorStop(0, '#fff');
  grad.addColorStop(0.4, '#6f6');
  grad.addColorStop(1, '#060');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(0, 0, p.r, 0, Math.PI * 2);
  ctx.fill();

  // Cross icon
  ctx.fillStyle = '#fff';
  ctx.fillRect(-5, -1.5, 10, 3);
  ctx.fillRect(-1.5, -5, 3, 10);

  ctx.restore();
}

function drawParticle(p) {
  const alpha = p.life / p.maxLife;
  ctx.fillStyle = p.color;
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.r * alpha, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawStars() {
  // Simple twinkling starfield
  for (let i = 0; i < 50; i++) {
    const sx = (i * 137.5 + 31) % W;
    const sy = (frame * (0.5 + i * 0.07) + i * 97) % H;
    const alpha = 0.3 + 0.4 * Math.sin(frame * 0.03 + i);
    ctx.fillStyle = `rgba(180,200,255,${alpha})`;
    ctx.fillRect(sx, sy, 2, 2);
  }
}

// ── Update ──────────────────────────────────
function update() {
  frame++;

  // Player movement
  if (useMouse) {
    const target = mouseX;
    player.x += (target - player.x) * 0.15;
  } else {
    if (keys['ArrowLeft'] || keys['a'] || keys['A']) player.x -= player.speed;
    if (keys['ArrowRight'] || keys['d'] || keys['D']) player.x += player.speed;
    if (keys['ArrowUp'] || keys['w'] || keys['W']) player.y -= player.speed;
    if (keys['ArrowDown'] || keys['s'] || keys['S']) player.y += player.speed;
  }

  // Clamp player
  player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, player.x));
  player.y = Math.max(player.h / 2, Math.min(H - player.h / 2, player.y));

  // Auto-shoot
  if (gameState === 'playing') {
    shootCooldown = Math.max(0, shootCooldown - 1);
    shoot();
  }

  // Invincibility
  if (player.invincible > 0) player.invincible--;

  // Spawn enemies
  spawnTimer++;
  difficultyTimer++;
  if (difficultyTimer > 600) {
    spawnInterval = Math.max(15, spawnInterval - 2);
    difficultyTimer = 0;
  }
  if (spawnTimer >= spawnInterval) {
    spawnEnemy();
    spawnTimer = 0;
  }

  // Update bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    bullets[i].y += bullets[i].vy;
    if (bullets[i].y < -20) bullets.splice(i, 1);
  }

  // Update enemy bullets
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    enemyBullets[i].y += enemyBullets[i].vy;
    enemyBullets[i].x += enemyBullets[i].vx || 0;
    if (enemyBullets[i].y > H + 20) enemyBullets.splice(i, 1);
  }

  // Update enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.y += e.speed;

    // Enemy shooting
    e.shootTimer--;
    if (e.shootTimer <= 0 && e.y > 0 && e.y < H - 100) {
      const dx = player.x - e.x;
      const dy = player.y - e.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      enemyBullets.push({
        x: e.x, y: e.y + e.h / 2,
        vx: (dx / dist) * 3.5,
        vy: (dy / dist) * 3.5,
      });
      e.shootTimer = 40 + Math.random() * 60;
    }

    // Off-screen removal
    if (e.y > H + 60) {
      enemies.splice(i, 1);
      continue;
    }

    // Bullet-enemy collision
    let hit = false;
    for (let j = bullets.length - 1; j >= 0; j--) {
      if (rectCollide(bullets[j], e)) {
        bullets.splice(j, 1);
        e.hp--;
        if (e.hp <= 0) {
          spawnParticles(e.x, e.y, e.color, 12);
          spawnPowerUp(e.x, e.y);
          score += e.score;
          enemies.splice(i, 1);
          hit = true;
          break;
        } else {
          spawnParticles(e.x, e.y, '#fff', 4);
        }
      }
    }
    if (hit) continue;

    // Enemy-player collision
    if (player.invincible === 0 && rectCollide(player, e)) {
      spawnParticles(e.x, e.y, e.color, 15);
      enemies.splice(i, 1);
      player.hp--;
      player.invincible = 60;
      if (player.hp <= 0) {
        gameOver();
        return;
      }
    }
  }

  // Update enemy bullets collision with player
  if (player.invincible === 0) {
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
      const b = enemyBullets[i];
      if (Math.abs(b.x - player.x) < player.w / 2 + 4 && Math.abs(b.y - player.y) < player.h / 2 + 4) {
        enemyBullets.splice(i, 1);
        player.hp--;
        player.invincible = 60;
        spawnParticles(player.x, player.y, '#fff', 8);
        if (player.hp <= 0) {
          gameOver();
          return;
        }
      }
    }
  }

  // Update power-ups
  for (let i = powerUps.length - 1; i >= 0; i--) {
    powerUps[i].y += powerUps[i].vy;
    if (powerUps[i].y > H + 30) {
      powerUps.splice(i, 1);
      continue;
    }
    if (circCollide(player, powerUps[i])) {
      if (powerUps[i].type === 'heal' && player.hp < 5) {
        player.hp++;
      }
      spawnParticles(powerUps[i].x, powerUps[i].y, '#6f6', 8);
      powerUps.splice(i, 1);
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ── Render ──────────────────────────────────
function render() {
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#080e24';
  ctx.fillRect(0, 0, W, H);
  drawStars();

  // Draw everything
  for (const p of powerUps) drawPowerUp(p);
  for (const b of bullets) drawBullet(b);
  for (const b of enemyBullets) drawEnemyBullet(b);
  for (const e of enemies) drawEnemy(e);
  for (const p of particles) drawParticle(p);
  if (gameState !== 'over') drawPlayer();

  // HUD
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px "Microsoft YaHei"';
  ctx.fillText(`分数: ${score}`, 14, 30);

  // HP hearts
  for (let i = 0; i < player.hp; i++) {
    ctx.fillStyle = '#ff4466';
    ctx.font = '20px sans-serif';
    ctx.fillText('♥', W - 30 - i * 28, 30);
  }
}

function gameOver() {
  gameState = 'over';
  spawnParticles(player.x, player.y, '#fff', 30);
}

function drawGameOver() {
  // Dim
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 42px "Microsoft YaHei"';
  ctx.textAlign = 'center';
  ctx.fillText('游戏结束', W / 2, H / 2 - 30);

  ctx.fillStyle = '#fff';
  ctx.font = '20px "Microsoft YaHei"';
  ctx.fillText(`最终得分: ${score}`, W / 2, H / 2 + 30);

  ctx.fillStyle = '#aaccff';
  ctx.font = '16px "Microsoft YaHei"';
  ctx.fillText('按空格键或点击重新开始', W / 2, H / 2 + 70);

  ctx.textAlign = 'start';
}

// ── Game loop ───────────────────────────────
function loop() {
  if (gameState === 'playing') {
    update();
    render();
  } else if (gameState === 'over') {
    // Keep rendering particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
    render();
    drawGameOver();
  } else {
    render();
  }
  requestAnimationFrame(loop);
}

function startGame() {
  gameState = 'playing';
  overlay.style.display = 'none';
  resetGame();
}

function restartGame() {
  resetGame();
  gameState = 'playing';
}

function resetGame() {
  score = 0;
  player.x = W / 2;
  player.y = H - 100;
  player.hp = 3;
  player.invincible = 60;
  bullets = [];
  enemies = [];
  enemyBullets = [];
  particles = [];
  powerUps = [];
  spawnTimer = 0;
  spawnInterval = 50;
  difficultyTimer = 0;
  shootCooldown = 0;
}

// Start
loop();
</script>
</body>
</html>
